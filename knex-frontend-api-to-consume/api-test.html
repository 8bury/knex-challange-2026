<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Tester – Knex Challenge</title>
  <style>
    :root {
      --bg: #0f0f12;
      --surface: #18181c;
      --border: #2a2a30;
      --text: #e4e4e7;
      --muted: #71717a;
      --accent: #a78bfa;
      --accent-hover: #c4b5fd;
      --success: #22c55e;
      --error: #ef4444;
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "JetBrains Mono", "Fira Code", "SF Mono", monospace;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 24px;
      line-height: 1.5;
      min-height: 100vh;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0 0 8px 0;
      color: var(--accent);
    }
    h2 {
      font-size: 0.95rem;
      font-weight: 600;
      margin: 24px 0 12px 0;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .container { max-width: 720px; margin: 0 auto; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 4px;
    }
    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="number"],
    textarea {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font: inherit;
      margin-bottom: 12px;
    }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    button {
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 10px 16px;
      border-radius: var(--radius);
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      margin-right: 8px;
      margin-bottom: 8px;
    }
    button:hover { background: var(--accent-hover); }
    button.secondary {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
    }
    button.secondary:hover { background: rgba(167, 139, 250, 0.1); }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .row > * { flex: 1 1 auto; min-width: 120px; }
    .output {
      margin-top: 12px;
      padding: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.8rem;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 240px;
      overflow: auto;
    }
    .output.success { border-color: var(--success); }
    .output.error { border-color: var(--error); color: #fca5a5; }
    .token-wrap { margin-bottom: 16px; }
    .token-wrap input { margin-bottom: 0; }
    .status { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
    .status.ok { color: var(--success); }
    .status.fail { color: var(--error); }
    ul.products-list {
      list-style: none;
      padding: 0;
      margin: 0 0 12px 0;
    }
    ul.products-list li {
      padding: 8px 12px;
      background: var(--bg);
      border-radius: var(--radius);
      margin-bottom: 6px;
      border: 1px solid var(--border);
      font-size: 0.85rem;
    }
    ul.products-list li strong { color: var(--accent); }
  </style>
</head>
<body>
  <div class="container">
    <h1>API Tester</h1>
    <p style="color: var(--muted); margin: 0 0 20px 0; font-size: 0.9rem;">Test auth and products endpoints (base: http://localhost:3000)</p>

    <div class="card token-wrap">
      <label for="baseUrl">Base URL</label>
      <input type="text" id="baseUrl" value="http://localhost:3000" placeholder="http://localhost:3000">
      <label for="token">JWT Token (set after login)</label>
      <input type="text" id="token" placeholder="Paste or leave empty — will be set on login">
    </div>

    <h2>Auth</h2>
    <div class="card">
      <label for="regName">Register — name</label>
      <input type="text" id="regName" placeholder="Name">
      <label for="regEmail">Email</label>
      <input type="email" id="regEmail" placeholder="email@example.com">
      <label for="regPassword">Password</label>
      <input type="password" id="regPassword" placeholder="••••••••">
      <button onclick="register()">Register</button>
      <div id="regOut" class="output" style="display:none;"></div>
    </div>
    <div class="card">
      <label for="loginEmail">Login — email</label>
      <input type="email" id="loginEmail" placeholder="email@example.com">
      <label for="loginPassword">Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••">
      <button onclick="login()">Login</button>
      <div id="loginOut" class="output" style="display:none;"></div>
    </div>

    <h2>Products</h2>
    <div class="card">
      <button onclick="listProducts()">GET /products</button>
      <div id="listOut" class="output" style="display:none;"></div>
      <ul id="productsList" class="products-list"></ul>
    </div>
    <div class="card">
      <label>Create product — 1) POST /files with image → 2) POST /products with file_id</label>
      <div class="row">
        <div><label for="createName">Name</label><input type="text" id="createName" placeholder="Product name"></div>
        <div><label for="createDesc">Description</label><input type="text" id="createDesc" placeholder="Description"></div>
        <div><label for="createPrice">Price</label><input type="number" id="createPrice" placeholder="0" step="0.01"></div>
      </div>
      <label for="createImage">Image (required — uploaded to /files first)</label>
      <input type="file" id="createImage" accept="image/*">
      <button onclick="createProduct()">Upload image then create product</button>
      <div id="createOut" class="output" style="display:none;"></div>
    </div>
    <div class="card">
      <label>Update product</label>
      <div class="row">
        <div><label for="updId">Product ID</label><input type="number" id="updId" placeholder="1"></div>
        <div><label for="updName">Name</label><input type="text" id="updName" placeholder="New name"></div>
        <div><label for="updDesc">Description</label><input type="text" id="updDesc" placeholder="New description"></div>
        <div><label for="updPrice">Price</label><input type="number" id="updPrice" placeholder="0" step="0.01"></div>
      </div>
      <button onclick="updateProduct()">PUT /products</button>
      <div id="updateOut" class="output" style="display:none;"></div>
    </div>
    <div class="card">
      <label for="delId">Delete product — Product ID</label>
      <input type="number" id="delId" placeholder="1">
      <button onclick="deleteProduct()" class="secondary">DELETE /products</button>
      <div id="deleteOut" class="output" style="display:none;"></div>
    </div>
  </div>

  <script>
    function base() { return document.getElementById('baseUrl').value.replace(/\/$/, ''); }
    function token() { return document.getElementById('token').value.trim(); }
    function show(elId, text, isError) {
      var el = document.getElementById(elId);
      el.textContent = text;
      el.className = 'output ' + (isError ? 'error' : 'success');
      el.style.display = 'block';
    }
    function showJson(elId, obj, isError) {
      show(elId, JSON.stringify(obj, null, 2), isError);
    }

    async function register() {
      var name = document.getElementById('regName').value.trim();
      var email = document.getElementById('regEmail').value.trim();
      var password = document.getElementById('regPassword').value;
      if (!name || !email || !password) {
        show('regOut', 'Fill name, email and password', true);
        return;
      }
      try {
        var r = await fetch(base() + '/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        var data = await r.json().catch(async function() { return { message: await r.text() }; });
        showJson('regOut', { status: r.status, body: data }, r.status >= 400);
      } catch (e) {
        show('regOut', 'Request failed: ' + e.message, true);
      }
    }

    async function login() {
      var email = document.getElementById('loginEmail').value.trim();
      var password = document.getElementById('loginPassword').value;
      if (!email || !password) {
        show('loginOut', 'Fill email and password', true);
        return;
      }
      try {
        var r = await fetch(base() + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        var data = await r.json().catch(async function() { return { message: await r.text() }; });
        showJson('loginOut', { status: r.status, body: data }, r.status >= 400);
        if (data.token) document.getElementById('token').value = data.token;
      } catch (e) {
        show('loginOut', 'Request failed: ' + e.message, true);
      }
    }

    async function listProducts() {
      var t = token();
      if (!t) {
        show('listOut', 'Login first and set token', true);
        return;
      }
      try {
        var r = await fetch(base() + '/products', {
          headers: { 'Authorization': t }
        });
        var data = await r.json().catch(async function() { return { message: await r.text() }; });
        showJson('listOut', { status: r.status, body: data }, r.status >= 400);
        var list = document.getElementById('productsList');
        list.innerHTML = '';
        if (data.products && data.products.length) {
          data.products.forEach(function(p) {
            var li = document.createElement('li');
            li.innerHTML = '<strong>#' + p.id + '</strong> ' + (p.name || '') + ' — ' + (p.price != null ? p.price : '') + (p.description ? ' — ' + p.description : '');
            list.appendChild(li);
          });
        }
      } catch (e) {
        show('listOut', 'Request failed: ' + e.message, true);
      }
    }

    async function createProduct() {
      var t = token();
      if (!t) {
        show('createOut', 'Login first and set token', true);
        return;
      }
      var name = document.getElementById('createName').value.trim();
      var description = document.getElementById('createDesc').value.trim();
      var price = document.getElementById('createPrice').value;
      var fileInput = document.getElementById('createImage');
      if (!fileInput.files.length) {
        show('createOut', 'Select an image file', true);
        return;
      }
      try {
        var fileForm = new FormData();
        fileForm.append('file', fileInput.files[0]);
        var fileRes = await fetch(base() + '/files', {
          method: 'POST',
          body: fileForm
        });
        var fileData = await fileRes.json().catch(async function() { return { message: await fileRes.text() }; });
        if (fileRes.status >= 400 || !fileData.file || !fileData.file.id) {
          showJson('createOut', { step: '1 – POST /files', status: fileRes.status, body: fileData }, true);
          return;
        }
        var fileId = fileData.file.id;
        var productRes = await fetch(base() + '/products', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': t },
          body: JSON.stringify({
            name: name || 'Product',
            description: description || '',
            price: price === '' ? 0 : parseFloat(price),
            file_id: fileId
          })
        });
        var productData = await productRes.json().catch(async function() { return { message: await productRes.text() }; });
        showJson('createOut', {
          step1: { 'POST /files': { status: fileRes.status, file_id: fileId } },
          step2: { 'POST /products': { status: productRes.status, body: productData } }
        }, productRes.status >= 400);
      } catch (e) {
        show('createOut', 'Request failed: ' + e.message, true);
      }
    }

    async function updateProduct() {
      var t = token();
      if (!t) {
        show('updateOut', 'Login first and set token', true);
        return;
      }
      var productId = document.getElementById('updId').value.trim();
      if (!productId) {
        show('updateOut', 'Enter product ID', true);
        return;
      }
      var payload = { product_id: parseInt(productId, 10) };
      var name = document.getElementById('updName').value.trim();
      var desc = document.getElementById('updDesc').value.trim();
      var price = document.getElementById('updPrice').value;
      if (name !== '') payload.name = name;
      if (desc !== '') payload.description = desc;
      if (price !== '') payload.price = parseFloat(price);
      try {
        var r = await fetch(base() + '/products', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'Authorization': t },
          body: JSON.stringify(payload)
        });
        var data = await r.json().catch(async function() { return { message: await r.text() }; });
        showJson('updateOut', { status: r.status, body: data }, r.status >= 400);
      } catch (e) {
        show('updateOut', 'Request failed: ' + e.message, true);
      }
    }

    async function deleteProduct() {
      var t = token();
      if (!t) {
        show('deleteOut', 'Login first and set token', true);
        return;
      }
      var productId = document.getElementById('delId').value.trim();
      if (!productId) {
        show('deleteOut', 'Enter product ID', true);
        return;
      }
      try {
        var r = await fetch(base() + '/products', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json', 'Authorization': t },
          body: JSON.stringify({ product_id: parseInt(productId, 10) })
        });
        var data = await r.json().catch(async function() { return { message: await r.text() }; });
        showJson('deleteOut', { status: r.status, body: data }, r.status >= 400);
      } catch (e) {
        show('deleteOut', 'Request failed: ' + e.message, true);
      }
    }
  </script>
</body>
</html>
